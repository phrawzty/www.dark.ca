{% extends "base.html" %}

{% block title %}{{ config.title }}{% endblock title %}

{% block main %}
<article class="post-full post">
    <header class="post-header">
        <h1 class="post-title">{{ section.title }}</h1>
    </header>
    <section class="post-content">
        {{ section.content | safe }}
    </section>
</article>
{% endblock main %}
